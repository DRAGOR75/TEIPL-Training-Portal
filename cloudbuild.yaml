steps:
  # 1. Install dependencies natively in Cloud Build environment
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # 2. Run Prisma migrations against the remote database
  - name: 'node:20'
    entrypoint: 'bash'
    args: 
      - '-c'
      - 'npx prisma migrate deploy'
    secretEnv: ['DATABASE_URL']

  # 3. Build the standalone Next.js container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/training-portal/app:v1', '.']

  # 4. Push the container to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/training-portal/app:v1']

  # 5. Deploy to Cloud Run without startup migrations
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'training-portal'
    - '--image'
    - 'asia-south1-docker.pkg.dev/$PROJECT_ID/training-portal/app:v1'
    - '--region'
    - 'asia-south1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--memory'
    - '1Gi'
    - '--set-env-vars'
    - 'NEXT_PUBLIC_APP_URL=https://training-portal-128987571260.asia-south1.run.app,AUTH_TRUST_HOST=true,NEXTAUTH_URL=https://training-portal-128987571260.asia-south1.run.app'
    - '--update-secrets'
    - 'DATABASE_URL=DATABASE_URL:latest,DATABASE_URL_UNPOOLED=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
    env: 'DATABASE_URL'
